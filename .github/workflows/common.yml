name: common
on:
  workflow_call:
    inputs:
      playbook_tag:
        required: true
        type: string
      playbook_extravar_secrets_add_path:
        type: string
      playbook_extravar_secrets_add_password:
        type: string
      playbook_extravar_secrets_copy_oldpath:
        type: string
      playbook_extravar_secrets_copy_newpath:
        type: string
      playbook_extravar_secrets_del_path:
        type: string
      playbook_extravar_secrets_edit_path:
        type: string
      playbook_extravar_secrets_edit_password:
        type: string
      playbook_extravar_secrets_export_confirm:
        type: string
      playbook_extravar_secrets_gen_path:
        type: string
      playbook_extravar_secrets_gen_len:
        type: string
      playbook_extravar_secrets_git_cmdargs:
        type: string
      playbook_extravar_secrets_git_push:
        type: string
      playbook_extravar_secrets_move_oldpath:
        type: string
      playbook_extravar_secrets_move_newpath:
        type: string
      gh_token:
        required: true
        type: string

concurrency:
  group: common
  cancel-in-progress: true

jobs:
  common:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "main"
          submodules: "true"
          token: "${{ inputs.gh_token }}"
      - name: Install Ansible, password-store and GnuPG
        shell: bash
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ansible pass gnupg
      - name: Run the playbook
        shell: bash
        working-directory: "${{ github.workspace }}"
        env:
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'
          ANSIBLE_HOST_KEY_CHECKING: False
          ANSIBLE_USER: "${{ github.actor }}"
          GH_TOKEN: "${{ inputs.gh_token }}"
          PLAYBOOK_TAGS: "${{ inputs.playbook_tag }}"
          PLAYBOOK_EXTRAVAR_SECRETS_ADD_PATH: "${{ inputs.playbook_extravar_secrets_add_path }}"
          PLAYBOOK_EXTRAVAR_SECRETS_ADD_PASSWORD: "${{ inputs.playbook_extravar_secrets_add_password }}"
          PLAYBOOK_EXTRAVAR_SECRETS_COPY_OLDPATH: "${{ inputs.playbook_extravar_secrets_copy_oldpath }}"
          PLAYBOOK_EXTRAVAR_SECRETS_COPY_NEWPATH: "${{ inputs.playbook_extravar_secrets_copy_newpath }}"
          PLAYBOOK_EXTRAVAR_SECRETS_DEL_PATH: "${{ inputs.playbook_extravar_secrets_del_path }}"
          PLAYBOOK_EXTRAVAR_SECRETS_EDIT_PATH: "${{ inputs.playbook_extravar_secrets_edit_path }}"
          PLAYBOOK_EXTRAVAR_SECRETS_EDIT_PASSWORD: "${{ inputs.playbook_extravar_secrets_edit_password }}"
          PLAYBOOK_EXTRAVAR_SECRETS_EXPORT_CONFIRM: "${{ inputs.playbook_extravar_secrets_export_confirm }}"
          PLAYBOOK_EXTRAVAR_SECRETS_GEN_PATH: "${{ inputs.playbook_extravar_secrets_gen_path }}"
          PLAYBOOK_EXTRAVAR_SECRETS_GEN_LEN: "${{ inputs.playbook_extravar_secrets_gen_len }}"
          PLAYBOOK_EXTRAVAR_SECRETS_GIT_CMDARGS: "${{ inputs.playbook_extravar_secrets_git_cmdargs }}"
          PLAYBOOK_EXTRAVAR_SECRETS_GIT_PUSH: "${{ inputs.playbook_extravar_secrets_git_push }}"
          PLAYBOOK_EXTRAVAR_SECRETS_MOVE_OLDPATH: "${{ inputs.playbook_extravar_secrets_move_oldpath }}"
          PLAYBOOK_EXTRAVAR_SECRETS_MOVE_NEWPATH: "${{ inputs.playbook_extravar_secrets_move_newpath }}"
        run: |
          # Here we use gh cli instead of github vars context for GPG_PUBLIC_KEY and GPG_PRIVATE_KEY variables because github vars context is constant during the whole execution workflow (and we need to update these variables and use their updated value here)
          PLAYBOOK_EXTRAVAR_SECRETS_INIT_GPGPUBLICKEY="$(gh variable get GPG_PUBLIC_KEY --org tiawl-lab || :)"
          PLAYBOOK_EXTRAVAR_SECRETS_INIT_GPGPRIVATEKEY="$(gh variable get GPG_PRIVATE_KEY --org tiawl-lab || :)"
          ansible-playbook -vvv --connection local \
                           --user "${ANSIBLE_USER}" \
                           --tags "${PLAYBOOK_TAGS}" \
                           --extra-vars "tldemo_secrets_user=${ANSIBLE_USER}" \
                           --extra-vars "tldemo_secrets_token=${GH_TOKEN}" \
                           --extra-vars "tldemo_secrets_cwd=${GITHUB_WORKSPACE}" \
                           --extra-vars "tldemo_secrets_add_path=${PLAYBOOK_EXTRAVAR_SECRETS_ADD_PATH:-}" \
                           --extra-vars "tldemo_secrets_add_password=${PLAYBOOK_EXTRAVAR_SECRETS_ADD_PASSWORD:-}" \
                           --extra-vars "tldemo_secrets_copy_oldpath=${PLAYBOOK_EXTRAVAR_SECRETS_COPY_OLDPATH:-}" \
                           --extra-vars "tldemo_secrets_copy_newpath=${PLAYBOOK_EXTRAVAR_SECRETS_COPY_NEWPATH:-}" \
                           --extra-vars "tldemo_secrets_del_path=${PLAYBOOK_EXTRAVAR_SECRETS_DEL_PATH:-}" \
                           --extra-vars "tldemo_secrets_edit_path=${PLAYBOOK_EXTRAVAR_SECRETS_EDIT_PATH:-}" \
                           --extra-vars "tldemo_secrets_edit_password=${PLAYBOOK_EXTRAVAR_SECRETS_EDIT_PASSWORD:-}" \
                           --extra-vars "tldemo_secrets_export_confirm=${PLAYBOOK_EXTRAVAR_SECRETS_EXPORT_CONFIRM:-}" \
                           --extra-vars "tldemo_secrets_gen_path=${PLAYBOOK_EXTRAVAR_SECRETS_GEN_PATH:-}" \
                           --extra-vars "tldemo_secrets_gen_len=${PLAYBOOK_EXTRAVAR_SECRETS_GEN_LEN:-}" \
                           --extra-vars "tldemo_secrets_git_cmdargs=${PLAYBOOK_EXTRAVAR_SECRETS_GIT_CMDARGS:-}" \
                           --extra-vars "tldemo_secrets_git_push=${PLAYBOOK_EXTRAVAR_SECRETS_GIT_PUSH:-}" \
                           --extra-vars "tldemo_secrets_move_oldpath=${PLAYBOOK_EXTRAVAR_SECRETS_MOVE_OLDPATH:-}" \
                           --extra-vars "tldemo_secrets_move_newpath=${PLAYBOOK_EXTRAVAR_SECRETS_MOVE_NEWPATH:-}" \
                           --extra-vars "tldemo_secrets_init_gpg_private_key=${PLAYBOOK_EXTRAVAR_SECRETS_INIT_GPGPRIVATEKEY}" \
                           --extra-vars "tldemo_secrets_init_gpg_public_key=${PLAYBOOK_EXTRAVAR_SECRETS_INIT_GPGPUBLICKEY}" \
                           ansible/main.yml
