---

- ansible.builtin.set_fact:
    org_gpg_public_key: ""
    org_gpg_private_key: ""

- block:
  - name: Check if the GnuPG key is an organization secret and register it
    block:
    - ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/git-hoster/secret/get.yml"
      vars:
        secret_name: 'GPG_PUBLIC_KEY'
        request_bearer: "{{ secrets_token }}"
    - ansible.builtin.set_fact:
        org_gpg_public_key: "{{ githoster_get_secret }}"
    - ansible.builtin.fail:
        msg: "GPG_PUBLIC_KEY organization secret not found"
      when: org_gpg_public_key | length == 0
    - ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/git-hoster/secret/get.yml"
      vars:
        secret_name: 'GPG_PRIVATE_KEY'
        request_bearer: "{{ secrets_token }}"
    - ansible.builtin.set_fact:
        org_gpg_private_key: "{{ githoster_get_secret }}"
    - ansible.builtin.fail:
        msg: "GPG_PRIVATE_KEY organization secret not found"
      when: org_gpg_private_key | length == 0

- name: Compare the GnuPG key with organization secrets
  block:
  - ansible.builtin.fail:
      msg: "GPG_PUBLIC_KEY organization secret and role input are not the same"
    when: org_gpg_public_key != gpg_public_key
  - ansible.builtin.fail:
      msg: "GPG_PRIVATE_KEY organization secret and role input are not the same"
    when: org_gpg_private_key != gpg_private_key
