---

- name: Check if the GnuPG key is an organization secret
  block:
  - ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/git-hoster/secret/get.yml"
    vars:
      secret_name: 'GPG_PUBLIC_KEY'
      request_bearer: "{{ secrets_token }}"
  - ansible.builtin.fail:
      msg: "GPG_PUBLIC_KEY organization secret not found"
    when: githoster_get_secret | length == 0
  - ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/git-hoster/secret/get.yml"
    vars:
      secret_name: 'GPG_PRIVATE_KEY'
      request_bearer: "{{ secrets_token }}"
  - ansible.builtin.fail:
      msg: "GPG_PRIVATE_KEY organization secret not found"
    when: githoster_get_secret | length == 0
