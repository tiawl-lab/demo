---

# TODO: check the passwords can be decrypted and encrypted with gpg-public-key.asc and gpg-private-key.asc files
# TODO: check the password-store repository has 1 more commit

- block:
  - name: Check the organization GnuPG key content
    ansible.builtin.include_tasks: tests/secrets/tasks/check_org_gpgkey.yml
    vars:
      gpg_public_key: "{{ lookup('ansible.builtin.file', secrets_cwd + '/' + repo_main_passwordstore_submodule_path + '/gpg-public-key.asc') | b64encode }}"
      gpg_private_key: "{{ lookup('ansible.builtin.file', secrets_cwd + '/' + repo_main_passwordstore_submodule_path + '/gpg-private-key.asc') | b64encode }}"

  rescue:
    - ansible.builtin.include_tasks: "{{ playbook_dir }}/tests/secrets/pre/cleanup.yml"
    - ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/secrets/cleanup.yml"
    - ansible.builtin.include_tasks: "{{ playbook_dir }}/tests/secrets/post/cleanup.yml"
    - ansible.builtin.fail:
        msg: "A previous rescued task failed"
- ansible.builtin.include_tasks: "{{ playbook_dir }}/tests/secrets/pre/cleanup.yml"
- ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/secrets/cleanup.yml"
- ansible.builtin.include_tasks: "{{ playbook_dir }}/tests/secrets/post/cleanup.yml"
